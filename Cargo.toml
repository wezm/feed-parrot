[package]
name = "read-rust"
version = "2.0.0"
authors = ["Wesley Moore <wes@wezm.net>"]
edition = "2018"

[dependencies]
chrono = { version = "0", features = ['serde'] }
#diesel = { version = "=1.4.3", features = ["postgres", "chrono", "uuidv07"] }
#dotenv = "0"
egg-mode = { version = "0", default-features = false, features = ["hyper-rustls"], optional = true }
env_logger = "0.11.5"
eyre = "0.6.12"
getopts = "0"
log = "0.4"
#elefren = { version = "0.21.0", default-features = false, features = ["rustls-tls"] }
reqwest = { version = "0.12.7", default-features = false, features = ["rustls-tls", "gzip", "json"] }
serde = { version = "1.0.152", features = ["derive"] }
serde_json = "1.0"
simple-eyre = "0.3.1"
time = { version = "0.3.21", features = ["serde", "parsing"] }
signal-hook = "0.3.17"
tokio = "1.0"
url = "2.0"
uuid = { version = "1.10", features = ['v4', 'serde'] }

[features]
default = []
twitter = ["egg-mode"]
